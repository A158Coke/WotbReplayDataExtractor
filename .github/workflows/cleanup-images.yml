name: Cleanup Docker Images
run-name: Cleanup old Docker Hub tags (keep latest 10)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old tags
        env:
          DOCKER_USER: a158coke
          DOCKER_TOKEN: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -e

          # Docker Hub API
          REPO="a158coke/wotbtool"
          HUB="https://hub.docker.com/v2"
          TOKEN=$(curl -sS -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKER_USER}\",\"password\":\"${DOCKER_TOKEN}\"}" \
            "${HUB}/users/login/" | jq -r '.token')

          for IMG in backend frontend; do
            echo "=== Cleaning ${IMG} tags ==="
            URL="${HUB}/repositories/${REPO}/tags?page_size=100"
            TAGS=""
            while [ -n "$URL" ]; do
              RESP=$(curl -sS -H "Authorization: JWT ${TOKEN}" "$URL")
              TAGS="$TAGS"$'\n'"$(echo "$RESP" | jq -r '.results[] | "\(.last_updated)\t\(.name)"')"
              URL=$(echo "$RESP" | jq -r '.next // empty')
            done
            echo "$TAGS" | grep "${IMG}-" | grep -v 'latest' | sort -r | tail -n +11 | cut -f2 | while read -r TAG; do
              [ -z "$TAG" ] && continue
              echo "Deleting ${REPO}:${TAG}..."
              curl -sS -X DELETE -H "Authorization: JWT ${TOKEN}" \
                "${HUB}/repositories/${REPO}/tags/${TAG}/"
              sleep 0.3
            done
            echo "=== Done ${IMG} ==="
          done
