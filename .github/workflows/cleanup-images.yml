name: Cleanup Docker Images
run-name: Cleanup old Docker Hub tags (keep latest 10 per family)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old tags
        env:
          DOCKER_USER: a158coke
          DOCKER_TOKEN: ${{ secrets.DOCKER_PASSWORD }}
          REPO: a158coke/wotbtool
          KEEP: "10"
        run: |
          set -euo pipefail
          HUB="https://hub.docker.com/v2"

          # --- 登录拿 JWT (token 必须是有 删除 权限的 PAT) ---
          TOKEN=$(curl -fsS -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKER_USER}\",\"password\":\"${DOCKER_TOKEN}\"}" \
            "${HUB}/users/login/" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::Docker Hub 登录失败(token 为空)。检查 DOCKER_PASSWORD 是否为有效 PAT。"
            exit 1
          fi
          echo "登录成功。"

          # --- 翻页抓取全部 tag: 每行 "时间<TAB>名字" ---
          ALL="$(mktemp)"
          URL="${HUB}/repositories/${REPO}/tags?page_size=100"
          while [ -n "$URL" ] && [ "$URL" != "null" ]; do
            RESP=$(curl -fsS -H "Authorization: JWT ${TOKEN}" "$URL")
            echo "$RESP" | jq -r '.results[] | "\(.last_updated)\t\(.name)"' >> "$ALL"
            URL=$(echo "$RESP" | jq -r '.next // empty')
          done
          echo "共抓取 $(wc -l < "$ALL") 个 tag。"

          FAILED=0
          # 每个 sha 家族保留最新 KEEP 个,其余删除;*-latest 永不删。
          for IMG in backend frontend; do
            echo "===== ${IMG}-sha-* (保留最新 ${KEEP} 个) ====="
            # 按时间倒序(最新在前)→ 跳过前 KEEP 个 → 余下即过期待删
            DELETE=$({ grep -P "\t${IMG}-sha-" "$ALL" || true; } | sort -rk1,1 | tail -n +"$((KEEP+1))" | cut -f2)
            if [ -z "$DELETE" ]; then
              echo "  无需删除。"
              continue
            fi
            echo "  待删除 $(echo "$DELETE" | grep -c .) 个:"
            while IFS= read -r TAG; do
              [ -z "$TAG" ] && continue
              CODE=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE \
                -H "Authorization: JWT ${TOKEN}" "${HUB}/repositories/${REPO}/tags/${TAG}/")
              if [ "$CODE" = "204" ] || [ "$CODE" = "200" ]; then
                echo "  已删除 ${TAG} (${CODE})"
              else
                echo "::warning::删除失败 ${TAG} (HTTP ${CODE})"
                FAILED=1
              fi
              sleep 0.3
            done <<< "$DELETE"
          done

          if [ "$FAILED" = "1" ]; then
            echo "::error::存在删除失败(多半是 PAT 缺少删除权限——到 Docker Hub Account Settings → Personal access tokens 把权限设为 Read/Write/Delete)。"
            exit 1
          fi
          echo "清理完成。"
